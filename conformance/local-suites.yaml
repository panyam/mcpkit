# mcpkit-local conformance suites manifest.
#
# Joined by tools/conformance-report at render time with the upstream
# tier-check + traceability output. Adding an entry here surfaces it in
# the "mcpkit-local Conformance Suites" section of CONFORMANCE.md.
#
# Schema:
#   suites:
#     - suite:       <make target name, e.g. testconf-skills>
#       sep:         <one-line description used as the "Covers" column>
#       stage:       <testall stage label, e.g. 8h. Use - for suites not in testall.>
#       status:      <PASS | FAIL | INFO | SKIP>
#       note:        <one-line context, used as a footnote when set>
#       tracking:    <plain-text issue/PR ref, e.g. "mcpkit 567". Optional.>
#
# Drift-checked against conformance/Makefile by scripts/check-local-suites.sh.
# CI fails if a testconf-* target exists in the Makefile but is missing here
# (or vice versa), or if the stage label disagrees with the testall wiring.
#
# Status semantics:
#   PASS  — suite runs green today
#   FAIL  — suite runs and has known failures that block the umbrella
#   INFO  — suite runs (or fails-fast) and is wired through run_stage_info
#           in testall so it does not count toward PASS/FAIL totals
#   SKIP  — suite intentionally not run in this revision; explain why in note

suites:
  - suite: testconf-tasks-v2
    sep: SEP-2663 Tasks v2
    stage: 8d
    status: PASS

  - suite: testconf-mrtr
    sep: SEP-2322 MRTR
    stage: 8e
    status: PASS

  - suite: testconf-file-inputs
    sep: SEP-2356 File inputs
    stage: 8f
    status: PASS

  - suite: testconf-auth-server
    sep: MCP authz 2025-11-25
    stage: 8g
    status: PASS

  - suite: testconf-stateless
    sep: SEP-2575 Stateless wire
    stage: "-"
    status: PASS
    note: "25 pass / 1 known upstream-test fail (array-vs-object requiredCapabilities)."

  - suite: testconf-skills
    sep: SEP-2640 Skills
    stage: 8h
    status: INFO
    note: "Fixture spawns and runs cleanly. Fork-side Scenario classes blocked on WG iteration of sep-2640.yaml in panyam/mcpconformance PR 330."
    tracking: "mcpkit 567"
