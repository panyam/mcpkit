# MCP Conformance Test Baseline
#
# Lists scenarios that are expected to fail. The conformance runner exits 0
# if only these scenarios fail (known gaps), but exits 1 if:
#   - A scenario NOT in this list fails (regression)
#   - A scenario IN this list passes (stale entry — remove it!)
#
# As features are implemented, remove the corresponding entries.

server:
  # Missing protocol features (not yet implemented in mcpkit)
  - server-sse-multiple-streams # Requires GET SSE stream (Streamable HTTP phase 2)

  # Missing capabilities (subscriptions, elicitation, sampling)
  - resources-subscribe         # Issue: #24
  - resources-unsubscribe       # Issue: #24
  - elicitation-sep1034-defaults   # Issue: #23
  - elicitation-sep1330-enums      # Issue: #23

  # Tool scenarios requiring server-to-client requests (bidirectional)
  - tools-call-sampling         # Requires sampling/createMessage (#22)
  - tools-call-elicitation      # Requires elicitation/create (#23)

# --- MCP Auth Conformance (client-side tests, spec 2025-11-25) ---
# Spec: https://modelcontextprotocol.io/specification/2025-11-25/basic/authorization
# These test the MCP client's OAuth flow: discovery, registration, PKCE, scopes.
# Run via: npx @modelcontextprotocol/conformance client --suite auth
# All scenarios are expected failures until mcpkit/auth Phase 3C-3E ships.
#
# Remove entries as the client OAuth flow is implemented.

client:
  # Passing (12/14 required):
  # ✓ auth/metadata-default, metadata-var1, metadata-var2, metadata-var3
  # ✓ auth/scope-from-www-authenticate, scope-from-scopes-supported, scope-omitted-when-undefined
  # ✓ auth/token-endpoint-auth-basic, token-endpoint-auth-post, token-endpoint-auth-none
  # ✓ auth/pre-registration
  # ⚠ auth/basic-cimd (passing with 1 warning — CIMD not implemented)

  # Required — CIMD (warning: not using Client ID Metadata Documents yet)
  - auth/basic-cimd                         # Client ID Metadata Document flow (warning)

  # Required — scope step-up (blocked on #53: client transport 401/403 handling)
  - auth/scope-step-up                      # 403 flow with scope escalation
  - auth/scope-retry-limit                  # Max retry attempts on repeated 403
