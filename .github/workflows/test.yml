name: Test

on:
  push:
    branches: [main, agent]
  pull_request:
    branches: [main, agent]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run unit tests
        run: go test ./... -v

      - name: Vet
        run: go vet ./...

      - name: Start test server
        run: |
          STREAMABLE=1 PORT=18799 go run ./cmd/testserver &
          for i in $(seq 1 30); do
            curl -s -o /dev/null -X POST http://localhost:18799/mcp \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -d '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0.0"}}}' \
              2>/dev/null && break
            sleep 1
          done

      - name: Run conformance suite
        run: npx -y @modelcontextprotocol/conformance server --url http://localhost:18799/mcp --expected-failures conformance/baseline.yml

  test-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run agent sub-module tests
        run: cd agent && go test ./... -v

      - name: Run agentchat tests
        run: cd cmd/agentchat && go test ./... -v

  test-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run auth sub-module tests
        run: cd ext/auth && go test ./... -v

      - name: Run E2E tests (auth + apps)
        run: cd tests/e2e && go test ./... -v -count=1 -timeout 60s

  test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run ui sub-module tests
        run: cd ext/ui && go test ./... -v -count=1 -timeout 30s

  conformance-report:
    # Regenerates CONFORMANCE.md against the current testserver + the upstream
    # conformance SHA pinned in the committed file's stamp line, and fails if
    # the result is stale. See issue 498.
    #
    # Why pin instead of tracking upstream/main: upstream advances daily, so
    # tracking main would make this gate fail on every PR until a maintainer
    # ran `make refresh-conformance` locally. Pinning to the stamp lets the
    # gate verify "the committed file is reproducible from its declared
    # inputs" — bumping upstream becomes an explicit, reviewable change
    # (run `make refresh-conformance` + commit the diff).
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout mcpkit
        uses: actions/checkout@v4
        with:
          path: mcpkit

      - name: Extract pinned upstream-conformance SHA from CONFORMANCE.md
        id: pin
        working-directory: mcpkit
        run: |
          # Stamp line shape: "<!-- generated against upstream-conformance@<sha> · protocol <ver> · ... -->"
          # Requires the full 40-char SHA — actions/checkout@v4 cannot resolve
          # short SHAs as refs (it tries to fetch them as branch/tag names).
          # The regex restricts capture to hex chars, so a maliciously crafted
          # body cannot inject anything into the `ref:` parameter below.
          SHA="$(sed -n 's/.*upstream-conformance@\([a-f0-9]\{40\}\).*/\1/p' CONFORMANCE.md | head -1)"
          if [ -z "$SHA" ]; then
            echo "::error::Could not extract upstream-conformance SHA from CONFORMANCE.md stamp line."
            echo "::error::Run 'make refresh-conformance' locally to regenerate the file."
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Pinned upstream-conformance@$SHA"

      - name: Checkout modelcontextprotocol/conformance at pinned SHA
        uses: actions/checkout@v4
        with:
          repository: modelcontextprotocol/conformance
          ref: ${{ steps.pin.outputs.sha }}
          path: conf-upstream-main

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcpkit/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          working-directory: mcpkit

      - name: Sync Python tooling env
        working-directory: mcpkit
        run: uv sync

      - name: Run renderer unit tests
        working-directory: mcpkit/tools/conformance-report
        run: |
          npm install --silent
          npm test

      - name: Check CONFORMANCE.md is fresh
        working-directory: mcpkit
        env:
          # tier-check needs a GH token to query repo-side signals (labels,
          # triage, etc.). The renderer drops those slices from CONFORMANCE.md
          # so they don't affect the diff; the token only keeps tier-check
          # from bailing during data collection.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MCPCONFORMANCE_BASE_PATH: ${{ github.workspace }}/conf-upstream-main
        run: make check-conformance-stale

      - name: Check Get Started snippets match the example
        working-directory: mcpkit
        run: make check-snippets

  apps-compat-report:
    # Mirrors conformance-report: regenerates conformance/apps/COMPAT.md
    # from umbrella tracking issue panyam/mcpkit#533 and fails if the
    # committed file is stale. Forces every fixture PR to update both the
    # umbrella row and the rendered report in lock-step. See issue 541.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run apps-compat renderer unit tests
        working-directory: tools/compat-reports
        run: |
          npm install --silent
          npm test

      - name: Check conformance/apps/COMPAT.md is fresh
        env:
          # GH_TOKEN is enough — the umbrella body is read via gh CLI
          # which inherits this from the env.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make check-apps-compat-stale
