name: Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'docs/site/**'
      - 'docs/**.md'
      - 'core/README.md'
      - 'server/README.md'
      - 'client/README.md'
      - 'ext/auth/docs/DESIGN.md'
      - 'ext/tasks/README.md'
      - 'CONFORMANCE.md'
      - 'conformance/UPSTREAM_AUDIT.md'
      - 'conformance/FIXTURE_AUDIT.md'
      - 'conformance/EXTERNAL_CHECKER.md'
      - 'conformance/apps/COMPAT.md'
      # Examples gallery (issue 508 on-ramp): READMEs + generated WALKTHROUGH.md
      # feed the per-example pages; bundle/ demokit trace players are re-mirrored
      # by collect_walkthroughs.py on every build.
      - 'examples/**/*.md'
      - 'examples/**/bundle/**'
      # Tutorials / concepts track.
      - 'tutorials/**/*.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v7
        with:
          go-version-file: docs/site/go.mod

      # docs/site/justfile's build recipe ends with
      # `uv run scripts/collect_walkthroughs.py` so the walkthrough
      # bundles ship alongside the rendered docs.  Provision uv +
      # sync the project's Python tooling env first; matches the
      # same pattern as test.yml's renderer-unit-tests job.
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - uses: extractions/setup-just@v4

      - name: Sync Python tooling env
        run: uv sync

      - name: Build site
        working-directory: docs/site
        run: just build

      # Self-hosted shields endpoint badge: root-module coverage computed
      # here and shipped inside the site output at /coverage/badge.json,
      # same pattern as the conformance badge (which is committed under
      # docs/site/static/ by refresh-conformance and rides `just build`).
      - name: Coverage badge
        run: |
          go test ./... -coverprofile=/tmp/cover.out -covermode=atomic > /dev/null
          PCT=$(go tool cover -func=/tmp/cover.out | tail -1 | awk '{gsub(/%/,"",$3); print $3}')
          COLOR=$(awk -v p="$PCT" 'BEGIN{print (p>=80)?"brightgreen":(p>=70)?"green":(p>=60)?"yellowgreen":(p>=50)?"yellow":"orange"}')
          mkdir -p docs/site/dist/docs/coverage
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$PCT" "$COLOR" > docs/site/dist/docs/coverage/badge.json
          cat docs/site/dist/docs/coverage/badge.json

      - uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: docs/site/dist/docs
          retention-days: 7

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v8
        with:
          name: docs-site
          path: dist

      - name: Publish to gh-pages branch
        # Pinned by commit SHA (v4.1.0, published 2026-05-12).
        # Third-party action — bump only via Dependabot/Renovate or a
        # deliberate manual review.  See pull request 526.
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: 'Deploy mcpkit docs site (${{ github.sha }})'
