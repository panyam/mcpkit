name: Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'docs/site/**'
      - 'docs/**.md'
      - 'core/README.md'
      - 'server/README.md'
      - 'client/README.md'
      - 'ext/auth/docs/DESIGN.md'
      - 'ext/tasks/README.md'
      - 'CONFORMANCE.md'
      - 'CAPABILITIES.md'
      - 'conformance/UPSTREAM_AUDIT.md'
      - 'conformance/FIXTURE_AUDIT.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: docs/site/go.mod

      - name: Build site
        working-directory: docs/site
        run: make build

      - uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/site/dist/docs
          retention-days: 7

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: dist

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: 'Deploy mcpkit docs site (${{ github.sha }})'
