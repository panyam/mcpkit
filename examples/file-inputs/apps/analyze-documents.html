<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Analyze Documents</title>
  <style>
    * { box-sizing: border-box }
    body { margin: 0; font-family: system-ui; padding: 1.5em; max-width: 520px }
    h1 { font-size: 1.25em; margin: 0 0 0.5em }
    p.hint { color: #666; margin: 0 0 1em }
    button {
      font-size: 1em; padding: 0.5em 1em; cursor: pointer;
      border-radius: 6px; border: 1px solid #ccc; background: #f5f5f5;
    }
    button:hover { background: #e8e8e8 }
    button:disabled { cursor: not-allowed; opacity: 0.5 }
    ul { list-style: none; padding-left: 0; margin: 0.75em 0 }
    li { font-family: ui-monospace, monospace; font-size: 0.85em; padding: 2px 0 }
    #status { margin-top: 1em; font-family: ui-monospace, monospace; font-size: 0.9em; white-space: pre-wrap }
    .err { color: #b00 }
    .ok { color: #060 }
  </style>
  <script type="module">
    window.MCPAppConfig = {
      name: "{{ .Bridge.AppName }}",
      version: "{{ .Bridge.AppVersion }}",
      protocolVersion: "{{ .Bridge.ProtocolVersion }}"
    };
    {{ .Bridge.BridgeJS }}

    // SEP-2356 Phase 2.1 — multi-file picker.
    // selectFiles returns string[]; pass directly to the analyze_documents tool.
    const button = document.getElementById('pick');
    const list   = document.getElementById('list');
    const status = document.getElementById('status');
    const setStatus = (msg, cls) => { status.textContent = msg; status.className = cls || ''; };

    button.addEventListener('click', async () => {
      button.disabled = true;
      list.replaceChildren();
      setStatus('Opening picker...');
      try {
        const dataUris = await MCPApp.selectFiles({
          accept: ['application/pdf', '.pdf'],
        });
        for (const uri of dataUris) {
          // Show the data URI's name= parameter for visual confirmation.
          const m = uri.match(/;name=([^;]+);/);
          const name = m ? decodeURIComponent(m[1]) : '(unnamed)';
          const li = document.createElement('li');
          li.textContent = `→ ${name} (${uri.length} chars)`;
          list.appendChild(li);
        }
        setStatus('Uploading via tools/call...');
        const res = await MCPApp.callTool('analyze_documents', { documents: dataUris });
        const text = (res && res.content || []).map(c => c.text || '').join('\n');
        setStatus(text || 'OK', 'ok');
      } catch (err) {
        if (err.name === 'MCPFileSelectionCanceled') {
          setStatus('Cancelled.');
        } else {
          setStatus(`${err.name || 'Error'}: ${err.message}`, 'err');
        }
      } finally {
        button.disabled = false;
      }
    });
  </script>
</head>
<body>
  <h1>SEP-2356 — multi-file picker</h1>
  <p class="hint">Choose one or more PDFs. Each is encoded as a data URI and sent in the same tools/call.</p>
  <button id="pick">Select PDFs</button>
  <ul id="list"></ul>
  <div id="status"></div>
</body>
</html>
