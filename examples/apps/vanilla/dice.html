<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dice Roller</title>
  <style>
    * { box-sizing: border-box }
    body { margin: 0; font-family: system-ui; text-align: center; padding: 2em }
    #result { font-size: 4em; margin: 0 }
    #label { color: #666 }
    button {
      font-size: 1.2em;
      padding: 0.5em 2em;
      cursor: pointer;
      margin-top: 1em;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #f5f5f5;
    }
    button:hover { background: #e8e8e8 }
  </style>
  <!-- Everything in ONE script block: config + bridge + app logic -->
  <script type="module">
    window.MCPAppConfig = {
      name: "{{ .Bridge.AppName }}",
      version: "{{ .Bridge.AppVersion }}",
      protocolVersion: "{{ .Bridge.ProtocolVersion }}"
    };
    {{ .Bridge.BridgeJS }}

    // --- App logic below ---
    function extractText(result) {
      if (result && result.content) {
        for (var i = 0; i < result.content.length; i++) {
          if (result.content[i].text) return result.content[i].text;
        }
      }
      return '';
    }
    function showResult(text) {
      var match = text.match(/: (\d+)/);
      document.getElementById('result').textContent = match ? match[1] : '?';
      document.getElementById('label').textContent = text || 'Rolled!';
    }
    MCPApp.on('toolresult', function(data) {
      showResult(extractText(data.result));
    });
    document.getElementById('roll').addEventListener('click', function() {
      document.getElementById('result').textContent = '🎲';
      document.getElementById('label').textContent = 'Rolling...';
      MCPApp.callTool('roll_dice', { sides: 6 }).then(function(res) {
        showResult(extractText(res));
      }).catch(function(err) {
        document.getElementById('label').textContent = 'Error: ' + err.message;
      });
    });
    // --- App-provided tools (host/model can call these) ---
    var lastRoll = null;
    MCPApp.registerTool('roll_dice', {
      description: 'Roll a die from the app UI',
      inputSchema: { type: 'object', properties: { sides: { type: 'number' } } }
    }, function(args) {
      var sides = args.sides || 6;
      var value = Math.floor(Math.random() * sides) + 1;
      lastRoll = { sides: sides, value: value };
      showResult('Rolled d' + sides + ': ' + value);
      return { content: [{ type: 'text', text: 'Rolled d' + sides + ': ' + value }] };
    });
    MCPApp.registerTool('get_last_roll', {
      description: 'Get the last dice roll result'
    }, function() {
      if (!lastRoll) return { content: [{ type: 'text', text: 'No rolls yet' }] };
      return { content: [{ type: 'text', text: 'Last roll: d' + lastRoll.sides + ' = ' + lastRoll.value }] };
    });

    MCPApp.on('connected', function() {
      document.getElementById('label').textContent = 'Connected! Ask the LLM to roll a die.';
    });
    setTimeout(function() {
      if (!MCPApp.connected) {
        document.getElementById('label').textContent = 'Bridge not connected to host';
      }
    }, 3000);
  </script>
</head>
<body>
  <h1 id="result">🎲</h1>
  <p id="label">Waiting for roll...</p>
  <button id="roll">Roll Again</button>
</body>
</html>
