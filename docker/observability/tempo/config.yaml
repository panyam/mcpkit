# Tempo trace backend config — single-binary mode, local filesystem
# storage. Sized for a developer laptop; not intended for production.
# A production deployment would split server / distributor / ingester
# / querier and back storage with S3 / GCS / Azure Blob.

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  trace_idle_period: 10s
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h  # short retention for a local dev stack

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
